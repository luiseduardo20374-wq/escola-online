<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escola Online</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}

header{
background:#2563eb;
color:white;
padding:20px;
text-align:center;
}

.card{
background:white;
margin:15px;
padding:15px;
border-radius:12px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px;
border-radius:8px;
width:100%;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
}

.materia{
margin-top:10px;
padding:10px;
background:#eef2ff;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<h1>📚 Escola Online</h1>
</header>

<div class="card">
<h2 id="saudacao">Olá 😊</h2>

<input id="nome" placeholder="Digite seu nome">

<button onclick="salvarNome()">Entrar</button>
</div>

<div class="card">
<h3>🔔 Avisos</h3>
<p>Nenhum aviso disponível.</p>
</div>

<div class="card">
<h3>📝 Atividades Recentes</h3>
<p>Você não tem nenhuma atividade no momento.</p>
</div>

<div class="card">
<h3>📖 Matérias</h3>

<div class="materia">Matemática</div>
<div class="materia">Português</div>
<div class="materia">Ciências</div>
<div class="materia">História</div>
<div class="materia">Geografia</div>
<div class="materia">Inglês</div>
<div class="materia">Artes</div>
<div class="materia">Educação Física</div>

</div>

<script>
function salvarNome(){
let nome=document.getElementById("nome").value;

if(nome!=""){
localStorage.setItem("nomeAluno",nome);
document.getElementById("saudacao").innerHTML=
"Olá 😊, tudo bem, "+nome+"!";
}
}

window.onload=function(){
let nome=localStorage.getItem("nomeAluno");

if(nome){
document.getElementById("saudacao").innerHTML=
"Olá 😊, tudo bem, "+nome+"!";
}
}
</script>

</body>
</html>
